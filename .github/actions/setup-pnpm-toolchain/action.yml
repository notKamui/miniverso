name: Setup PNPM Toolchain
description: Setup Node.js 25, pnpm, and install dependencies
runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '25'
    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: latest
    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile
