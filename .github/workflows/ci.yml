name: CI Pipeline

on:
  pull_request:
    branches:
      - main
      - dev
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

jobs:
  type-check:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-pnpm-toolchain
      - name: Run type check
        run: pnpm check:tc

  lint:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-pnpm-toolchain
      - name: Run lint
        run: pnpm check:lint

  fmt:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-pnpm-toolchain
      - name: Run fmt
        run: pnpm check:fmt

  test:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-pnpm-toolchain
      - name: Run tests
        run: pnpm test:run
